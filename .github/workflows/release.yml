name: Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: '发布版本号（如 1.0.0）'
        required: true
        default: '1.0.0'

env:
  Version: ${{ github.event.inputs.releaseVersion }}
  PackageVersion: ${{ github.event.inputs.releaseVersion }}
  IMAGE_NAME: ghcr.io/winm-tech/baget

jobs:
  verify:
    name: 运行测试
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 运行测试
        run: dotnet test --verbosity normal

  release_zip:
    needs: verify
    name: 发布 zip 到 GitHub Releases
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 发布
        run: dotnet publish src/BaGet --configuration Release --output artifacts

      - name: 打包为 zip
        run: cd artifacts && zip -r ../BaGet-${{ github.event.inputs.releaseVersion }}.zip .

      - name: 上传到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.releaseVersion }}
          name: v${{ github.event.inputs.releaseVersion }}
          files: BaGet-${{ github.event.inputs.releaseVersion }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_docker:
    needs: verify
    name: 发布 Docker 镜像到 GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.releaseVersion }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

